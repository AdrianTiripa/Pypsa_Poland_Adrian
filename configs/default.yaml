# default.yaml

paths:
  input_folder: ../data
  data_folder: ../database
  profiles_folder: ../Profiles_1940_2025
  scenario_profiles_root: ../Profiles_new
  runs_folder: ../runs

snapshots:
  year: 2020
  stepsize: 3
  keep_feb29: false

pipeline:
  - generators
  - heat
  - hydrogen
  - cop
  - hydrogen_storage
  - heat_storage
  - high_grade_heat
  - transport
  - dc_link
  - co2_constraint

solver:
  name: gurobi
  options:
    Method: 2
    Crossover: 1
    # NumericFocus: 2
    BarHomogeneous: 1
    ScaleFlag: 2
    # BarConvTol: 0.0001
    # OptimalityTol: 0.0001
    # FeasibilityTol: 0.0001

# -------------------------
# Dynamic profile selection
# -------------------------

profiles:
  use_dynamic_heat_cop: true
  scenario: Core
  system_year: 2050

  heat:
    folder: HeatDemand
    prefix: Qishare

  cop:
    folder: COP
    prefix: COPiavg3

# -------------------------
# Input files
# -------------------------

files:
  # Weather-year VRES profiles (kept from old folder unless you move them too)
  pv_cf: TprovCF_PV_1940_2025.csv
  onshore_cf: Provincial_Onshore_CF_1940_2025.csv
  offshore_cf: Offshore_CF_hourly_1940_2025.csv

  # Old placeholders kept for backward compatibility;
  # ignored when profiles.use_dynamic_heat_cop: true
  cop_multi: COP_1940_2025_working_data.csv
  heat_demand_multi: HeatDemand_1940_2025_working_data.csv

  # Unchanged demand files
  heat_demand_industry: 2020_HeatDemandIndustry.xlsx
  hydrogen_demand: 2020_PureHydrogen.xlsx
  transport_demand: 2020_ElectricTransport.xlsx

constraints:
  co2_limit_tonnes: 23750000

capacity_targets:
  solar_pv_ground_total_mw: 69844
  wind_onshore_total_mw: 36400
  natural_gas_min_mw: 20200
  nuclear_min_mw: 19843

  storage_unit_p_nom_min_mw:
    hydrogen_storage: 3700
    hydrogen_storage_other: 22400
    battery: 19469
    flow: 156
    PSH: 9070
    hot_water: 3300

  link_p_nom_caps_mw:
    links_ending_hydrogen_max: 67000
    links_ending_electrolyzer_max: 60000

operational_constraints:
  hydrogen_min_soc:
    enabled: true
    min_soc_fraction: 0.3
    enforce_from_snapshot_index: 360
    units:
      - Hydrogen_Storage_PL KP_hydrogen

heat:
  demand_scale: 1000.0 # MW -> GW

  heat_pump:
    carrier: heat_pump
    cop_default: 3.0
    capital_cost: 10000
    marginal_cost: 0.01
    p_nom_extendable: true

  thermal_storage:
    carrier: hot_water
    efficiency_store: 0.95
    efficiency_dispatch: 0.95
    standing_loss: 0.001
    capital_cost: 30000
    marginal_cost: 0.0
    lifetime: 20
    max_hours: 9.2
    p_nom_extendable: true

  high_temp_heat:
    carrier: high_temp_heat
    chp_h2_plant:
      efficiency_el: 0.3
      efficiency_heat: 0.6
      capital_cost: 20000
      p_nom: 0
      p_nom_extendable: true

hydrogen:
  electrolyser:
    efficiency: 0.67
    capital_cost: 330000
    p_nom_extendable: true
    ramp_limit_up: 0.2
    ramp_limit_down: 0.2
    carrier: hydrogen

hydrogen_storage:
  cavern:
    carrier: "hydrogen storage"
    p_nom_extendable: true
    max_hours: 106.0
    efficiency_store: 0.99
    efficiency_dispatch: 0.995
    capital_cost: 60000
    standing_loss: 0.001
    cyclic_state_of_charge: false

  other:
    carrier: "hydrogen storage other"
    p_nom_extendable: true
    max_hours: 24.0
    efficiency_store: 0.8
    efficiency_dispatch: 0.95
    capital_cost: 90000
    standing_loss: 0.0001
    cyclic_state_of_charge: false

  caps:
    Hydrogen_Storage_PL KP_hydrogen:
      p_nom_max: 24375.0
      p_nom_min: 2000.0
    Hydrogen_Storage_PL DS_hydrogen:
      p_nom_max: 54166.6666667
    Hydrogen_Storage_PL PK_hydrogen:
      p_nom_max: 40111.1111111
    Hydrogen_Storage_PL MA_hydrogen:
      p_nom_max: 3750.0

  price_anchor:
    bus: "PL SK_hydrogen"
    load_name: "H2_price_anchor"

transport:
  carrier: transport

  link:
    efficiency: 0.99
    capital_cost: 1000
    p_nom: 0
    p_nom_extendable: true

  storage:
    carrier: electricity
    efficiency_store: 0.95
    efficiency_dispatch: 0.95
    standing_loss: 0.001
    capital_cost: 1000
    marginal_cost: 0.0
    lifetime: 20
    max_hours: 8
    p_nom_extendable: false
    p_nom_factor_of_mean_demand: 0.25

network:
  dc_links:
    - name: "DC - PL ZP - PL SL"
      bus0: "PL ZP"
      bus1: "PL SL"
      p_nom: 4000
      p_nom_extendable: false
      p_min_pu: -1.0
      efficiency: 1.0
      carrier: "DC"

supply:
  thermal_unlock:
    carriers: ["Natural gas", "Biogas plant"]
    set_extendable: true
    default_p_nom_max: 1.0e9

  nuclear:
    buses: ["PL KP", "PL LD", "PL MA", "PL MZ", "PL PM", "PL SK", "PL WP"]
    skip_missing_buses: true
    capital_cost: 875000
    marginal_cost: 20
    efficiency: 0.33
    ramp_limit_up: 0.075
    ramp_limit_down: 0.075
    p_min_pu: 0.65
    co2_emissions: 0.0
    color: "#808080"
    default_p_nom_max: 0

    p_nom_max_by_bus:
      PL KP: 1800
      PL LD: 3750
      PL MA: 1200
      PL MZ: 3750
      PL PM: 3750
      PL SK: 3750
      PL WP: 3750

    p_nom_min_by_bus:
      PL PM: 3750

  biogas:
    carrier_name: "Biogas plant"
    p_min_pu: 0.55